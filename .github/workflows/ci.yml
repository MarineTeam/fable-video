name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No lockfile is committed by design — Vercel installs fresh on deploy,
      # and CI mirrors that.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          AUTH0_SECRET: 6f0f2c9a4d1e8b37c5a2f4d6e8091b3d5f7a9c1e3b5d7f90a2c4e6081b3d5f70
          AUTH0_DOMAIN: example.us.auth0.com
          AUTH0_CLIENT_ID: ci-client-id
          AUTH0_CLIENT_SECRET: ci-client-secret
          APP_BASE_URL: http://localhost:3000
          ADMIN_EMAILS: admin@example.com
          BUNNY_LIBRARY_ID: "1"
          BUNNY_API_KEY: ci-dummy-key
          BUNNY_TOKEN_AUTH_KEY: ci-dummy-token
          KV_REST_API_URL: https://ci-dummy.upstash.io
          KV_REST_API_TOKEN: ci-dummy
